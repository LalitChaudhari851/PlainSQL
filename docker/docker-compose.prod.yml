# ── PlainSQL Production Compose ────────────────────────────
# Separate from development compose for production-specific concerns:
# - Resource limits
# - Gunicorn workers
# - Named volumes with labels
# - No port exposure for internal services
# - Nginx reverse proxy with SSL termination ready

version: "3.9"

services:
  # ── PlainSQL API (Production) ──────────────────────────
  api:
    image: plainsql-api:prod
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: plainsql-api-prod
    env_file:
      - ../.env
    environment:
      DB_URI: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/chatbot
      REDIS_URL: redis://redis:6379/0
      ENV: production
      LOG_LEVEL: INFO
      GUNICORN_WORKERS: "4"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_db
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    networks:
      - plainsql-net
    # No ports exposed — Nginx handles external access

  # ── MySQL Database ─────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: plainsql-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-plainsql_prod_password}
      MYSQL_DATABASE: chatbot
    volumes:
      - mysql_data:/var/lib/mysql
      - ../db.sql:/docker-entrypoint-initdb.d/01-db.sql:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - plainsql-net
    # No ports exposed in production

  # ── Redis Cache ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: plainsql-redis-prod
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - plainsql-net

  # ── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: plainsql-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for SSL:
      # - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
    networks:
      - plainsql-net

volumes:
  chroma_data:
    driver: local
    labels:
      com.plainsql.description: "ChromaDB vector store data"
  redis_data:
    driver: local
    labels:
      com.plainsql.description: "Redis cache data"
  mysql_data:
    driver: local
    labels:
      com.plainsql.description: "MySQL database data"

networks:
  plainsql-net:
    driver: bridge
